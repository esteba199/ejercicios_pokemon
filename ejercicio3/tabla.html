<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - Tabla HTML</title>
    <style>
        table {
            width: 600px;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        thead {
            background-color: #FFDE00;
        }

        .special-gray {
            background-color: #ddd;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pokémon</th>
                    <th>Tipo</th>
                    <th>Nivel</th>
                    <th>Región</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="2">Pikachu</td>
                    <td>Eléctrico</td>
                    <td>25</td>
                    <td>Kanto</td>
                </tr>
                <tr>
                    <td colspan="2" class="special-gray">Especial Ataque</td>
                    <td>Johto</td>
                </tr>
                <tr>
                    <td>Charmander</td>
                    <td>Fuego</td>
                    <td>15</td>
                    <td>Hoenn</td>
                </tr>
                <tr>
                    <td>Bulbasaur</td>
                    <td>Planta</td>
                    <td>18</td>
                    <td>Sinnoh</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
