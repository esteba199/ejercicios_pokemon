<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 - Grid sin Areas</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }

        .box {
            background-color: #3B4CCA;
            color: white;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .box1 {
            grid-column: 1 / 3;
            grid-row: 1 / 2;
        }

        .box2 {
            grid-column: 3 / 5;
            grid-row: 1 / 3;
        }

        .box3 {
            grid-column: 1 / 2;
            grid-row: 2 / 4;
        }

        .box4 {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .box5 {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
        }

        .box6 {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
        <div class="box box6">6</div>
    </div>
</body>

</html>
