<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - PokéCampus</title>
    <style>
        :root {
            --gris-claro: #e1515e;
            --gris-oscuro: #3B4CCA;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .main-header {
            background-color: var(--gris-oscuro);
            color: var(--blanco);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        .nav-menu a {
            color: var(--blanco);
            text-decoration: none;
        }

        .auth-buttons {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 5px 10px;
            border: 1px solid black;
            cursor: pointer;
        }

        .btn-login {
            background-color: var(--gris-claro);
            color: black;
        }

        .btn-register {
            background-color: var(--gris-claro);
            color: black;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#EE1515" />
                <path d="M5 50 H95" stroke="black" stroke-width="8" />
                <circle cx="50" cy="50" r="18" fill="white" stroke="black" stroke-width="6" />
            </svg>
            <span>PokéCampus</span>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Pokédex</a></li>
                <li><a href="#">Combates</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>

        <div class="auth-buttons">
            <button class="btn btn-login">Iniciar sesión</button>
            <button class="btn btn-register">Registrarse</button>
        </div>
    </header>
</body>

</html>
